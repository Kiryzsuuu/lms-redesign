<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python for Data Manipulation — InspiraLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0C628D;--blue-m:#1178AB;--blue-d:#084E72;--blue-s:#C8E6F5;--blue-xs:#EBF6FC;
  --orange:#F3921B;--orange-m:#D97A0E;--orange-xs:#FEF5E7;
  --teal:#0BA894;--teal-s:#B2EFE9;--teal-xs:#E8FAF8;
  --violet:#7C3AED;--violet-xs:#F5F3FF;
  --amber:#D97706;--amber-xs:#FFFBEB;
  --lime:#65A30D;--lime-s:#D9F99D;--lime-xs:#F7FEE7;
  --n950:#0F172A;--n900:#1E293B;--n800:#334155;--n700:#475569;
  --n600:#64748B;--n500:#94A3B8;--n400:#CBD5E1;--n300:#E2E8F0;
  --n200:#F1F5F9;--n100:#F8FAFC;--white:#FFFFFF;
  --sb-w:300px;--tb-h:58px;
  --fd:'Bricolage Grotesque',system-ui,sans-serif;
  --fb:'Inter',system-ui,sans-serif;
  --t:.18s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--fb);background:var(--n200);color:var(--n900);font-size:14px;line-height:1.6;overflow:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
ul{list-style:none}

/* ── TOPBAR ── */
.tb{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--tb-h);background:var(--white);border-bottom:1px solid var(--n300);display:flex;align-items:center;padding:0 1.2rem;gap:.8rem}
.tb-logo{display:flex;align-items:center;gap:.5rem;font-family:var(--fd);font-weight:800;font-size:.95rem;letter-spacing:-.03em;color:var(--n950);text-decoration:none;flex-shrink:0}
.tb-logo-ico{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--blue-m));display:flex;align-items:center;justify-content:center}
.tb-logo-ico svg{width:13px;height:13px}
.tb-acc{color:var(--orange)}
.tb-div{width:1px;height:22px;background:var(--n300);flex-shrink:0}
.tb-mid{flex:1;min-width:0;display:flex;align-items:center;gap:1rem}
.tb-name{font-size:.82rem;font-weight:600;color:var(--n700);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px}
.tb-bar{flex:1;max-width:280px;display:flex;align-items:center;gap:.55rem}
.tb-track{flex:1;height:5px;background:var(--n300);border-radius:9999px;overflow:hidden}
.tb-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:9999px;transition:width .6s ease}
.tb-lbl{font-size:.72rem;font-weight:600;color:var(--n500);white-space:nowrap}
.tb-right{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.tbtn{display:inline-flex;align-items:center;gap:.3rem;font-size:.77rem;font-weight:600;padding:.37rem .8rem;border-radius:7px;transition:all var(--t)}
.tbtn-g{background:transparent;color:var(--n600);border:1px solid var(--n300)}
.tbtn-g:hover{background:var(--n100);color:var(--n900)}
.tbtn-b{background:var(--blue);color:#fff}
.tbtn-b:hover{background:var(--blue-m)}
.tbtn-t{background:linear-gradient(135deg,var(--teal),#0a7a76);color:#fff}
.tbtn-t:hover{opacity:.9}
.sb-tog{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:var(--n100);border:1px solid var(--n300);color:var(--n600);font-size:.85rem;transition:all var(--t)}
.sb-tog:hover{background:var(--blue-xs);color:var(--blue);border-color:var(--blue-s)}

/* ── SHELL ── */
.shell{display:flex;height:100vh;padding-top:var(--tb-h)}

/* ── SIDEBAR ── */
.sidebar{width:var(--sb-w);flex-shrink:0;background:var(--white);border-right:1px solid var(--n300);display:flex;flex-direction:column;height:100%;overflow:hidden;transition:width var(--t),opacity var(--t)}
.sidebar.collapsed{width:0;opacity:0;pointer-events:none}
.sb-hd{padding:.85rem 1rem .75rem;border-bottom:1px solid var(--n200);flex-shrink:0}
.sb-title{font-family:var(--fd);font-size:.87rem;font-weight:700;color:var(--n950);line-height:1.35;margin-bottom:.5rem}
.sb-pr{display:flex;align-items:center;gap:.5rem}
.sb-pr-track{flex:1;height:4px;background:var(--n200);border-radius:9999px;overflow:hidden}
.sb-pr-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:9999px;transition:width .5s ease}
.sb-pr-txt{font-size:.69rem;font-weight:600;color:var(--n500);white-space:nowrap}
.sb-body{flex:1;overflow-y:auto;overflow-x:hidden}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--n300);border-radius:2px}

/* Module header */
.mod-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;padding:.7rem 1rem;background:var(--n100);cursor:pointer;user-select:none;transition:background var(--t);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--n200)}
.mod-hd:hover{background:var(--n200)}
.mod-hd.open{background:var(--blue-xs);border-left:3px solid var(--blue)}
.mh-info{flex:1;min-width:0}
.mh-num{font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--n400);margin-bottom:.1rem}
.mod-hd.open .mh-num{color:var(--blue)}
.mh-title{font-size:.83rem;font-weight:700;color:var(--n800);line-height:1.3}
.mod-hd.open .mh-title{color:var(--blue-d)}
.mh-meta{font-size:.67rem;color:var(--n400);margin-top:.18rem}
.mh-r{display:flex;align-items:center;gap:.4rem;flex-shrink:0;margin-top:2px}
.mh-badge{font-size:.62rem;font-weight:700;padding:.11rem .42rem;border-radius:9999px;background:var(--teal-xs);color:var(--teal);border:1px solid var(--teal-s)}
.mh-chev{font-size:.67rem;color:var(--n400);transition:transform .25s}
.mod-hd.open .mh-chev{transform:rotate(180deg);color:var(--blue)}
.mod-body{display:none}
.mod-body.open{display:block}

/* Materi item */
.mi{display:flex;align-items:flex-start;gap:.55rem;padding:.58rem 1rem;border-bottom:1px solid var(--n100);cursor:pointer;transition:background var(--t)}
.mi:hover{background:var(--blue-xs)}
.mi.active{background:var(--blue-xs);border-left:3px solid var(--blue);padding-left:calc(1rem - 3px)}
.mi.active .mi-title{color:var(--blue);font-weight:600}
.mi-dot{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;flex-shrink:0;margin-top:2px}
.d-done{background:var(--teal);color:#fff}
.d-active{background:var(--blue);color:#fff}
.d-todo{background:var(--white);color:var(--n400);border:1.5px solid var(--n300)}
.mi-info{flex:1;min-width:0}
.mi-title{font-size:.79rem;font-weight:500;color:var(--n700);line-height:1.4;margin-bottom:.15rem}
.mi-sub{display:flex;align-items:center;gap:.3rem}
.mi-badge{font-size:.61rem;font-weight:700;padding:.09rem .36rem;border-radius:3px;text-transform:uppercase;letter-spacing:.04em}
.bt-v{background:var(--blue-xs);color:var(--blue)}
.bt-r{background:var(--violet-xs);color:var(--violet)}
.bt-q{background:var(--amber-xs);color:var(--amber)}
.bt-p{background:var(--teal-xs);color:var(--teal)}
.mi-dur{font-size:.66rem;color:var(--n400)}

/* Sidebar footer */
.sb-ft{flex-shrink:0;padding:.7rem;border-top:1px solid var(--n200)}
.cert-card{background:linear-gradient(135deg,var(--teal-xs),var(--blue-xs));border:1px solid var(--teal-s);border-radius:10px;padding:.8rem 1rem;text-align:center}
.cc-title{font-size:.77rem;font-weight:700;color:var(--teal);margin-bottom:.2rem}
.cc-sub{font-size:.68rem;color:var(--n600);margin-bottom:.55rem}
.cc-btn{display:block;width:100%;padding:.46rem;background:linear-gradient(135deg,var(--teal),#0a7a76);color:#fff;border:none;border-radius:7px;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;transition:all var(--t)}
.cc-btn:hover{opacity:.9;transform:translateY(-1px)}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--white)}
.crumb{display:flex;align-items:center;gap:.32rem;padding:.6rem 2rem;border-bottom:1px solid var(--n200);flex-shrink:0;flex-wrap:wrap}
.cl{font-size:.73rem;color:var(--blue);font-weight:500;transition:color var(--t)}
.cl:hover{color:var(--blue-m)}
.cs{font-size:.61rem;color:var(--n400)}
.cc{font-size:.73rem;font-weight:600;color:var(--n800)}
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.main-scroll::-webkit-scrollbar{width:5px}
.main-scroll::-webkit-scrollbar-thumb{background:var(--n300);border-radius:3px}
.content{padding:1.75rem 2.25rem 2.5rem;max-width:820px}

/* Lesson header */
.lesson-hd{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:1.5rem}
.lh-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.lh-type{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.18rem}
.lh-title{font-family:var(--fd);font-size:1.5rem;font-weight:800;color:var(--n950);letter-spacing:-.03em;line-height:1.2}

/* Tabs */
.ctabs{display:flex;border-bottom:1.5px solid var(--n200);margin-bottom:1.5rem;overflow-x:auto}
.ctab{font-size:.81rem;font-weight:600;color:var(--n500);padding:.6rem 1rem;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;cursor:pointer;background:transparent;border-left:none;border-right:none;border-top:none;transition:all var(--t)}
.ctab:hover{color:var(--n700)}
.ctab.active{color:var(--blue);border-bottom-color:var(--blue)}
.cp{display:none}
.cp.active{display:block}

/* Video */
.vwrap{border-radius:14px;margin-bottom:1.5rem;background:linear-gradient(135deg,#0A1929,#0f2744);aspect-ratio:16/9;max-height:400px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;box-shadow:0 8px 30px rgba(15,23,42,.2)}
.vg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(12,98,141,.18) 0%,transparent 50%,rgba(243,146,27,.1) 100%)}
.vcode{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);padding:.65rem 1.15rem;font-family:monospace;font-size:.71rem;color:rgba(255,255,255,.65);line-height:1.6}
.sk{color:#569CD6}.ss{color:#CE9178}.sc{color:#6A9955}.sf{color:#DCDCAA}
.vcenter{position:relative;z-index:2;text-align:center}
.vlabel{color:rgba(255,255,255,.4);font-size:.73rem;margin-bottom:.8rem}
.vplay{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--t);margin:0 auto .55rem}
.vplay:hover{background:rgba(255,255,255,.25);transform:scale(1.08)}
.vplay svg{margin-left:4px}
.vdur{font-size:.71rem;color:rgba(255,255,255,.35)}

/* Outcome */
.outcome-box{background:var(--n100);border:1px solid var(--n300);border-radius:12px;padding:1rem 1.15rem;margin-bottom:1.2rem}
.oi{display:flex;align-items:flex-start;gap:.55rem;padding:.45rem 0;border-bottom:1px solid var(--n200);font-size:.86rem;color:var(--n700);line-height:1.5}
.oi:last-child{border-bottom:none;padding-bottom:0}
.oi-chk{width:19px;height:19px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.57rem;font-weight:800;flex-shrink:0;margin-top:2px}

/* Callout */
.callout{display:flex;gap:.62rem;padding:.82rem 1rem;border-radius:9px;border-left:3px solid;margin-bottom:1rem;font-size:.84rem;line-height:1.6}
.c-b{background:var(--blue-xs);border-color:var(--blue);color:var(--blue-d)}
.c-t{background:var(--teal-xs);border-color:var(--teal);color:#0a6060}
.c-o{background:var(--orange-xs);border-color:var(--orange);color:#8B4500}
.c-l{background:var(--lime-xs);border-color:var(--lime);color:#3a5c00}
.ci{font-size:.92rem;flex-shrink:0;margin-top:1px}

/* Rich */
.rich{font-size:.88rem;color:var(--n700);line-height:1.85}
.rich h3{font-family:var(--fd);font-size:.96rem;font-weight:800;color:var(--n900);margin:1rem 0 .4rem}
.rich p{margin-bottom:.85rem}
.rich ul{margin:.2rem 0 .85rem 1rem}
.rich li{list-style:disc;margin-bottom:.38rem;color:var(--n700)}
.rich code{background:var(--n200);color:var(--blue-d);font-family:monospace;font-size:.82em;padding:.07rem .3rem;border-radius:4px}
.rich pre{background:var(--n950);color:#e2e8f0;padding:.9rem 1.1rem;border-radius:10px;font-family:monospace;font-size:.79rem;line-height:1.7;overflow-x:auto;margin:.2rem 0 .95rem;box-shadow:0 4px 12px rgba(15,23,42,.15)}

/* Section block */
.sblk{margin-bottom:1.5rem}
.shd{font-family:var(--fd);font-size:.96rem;font-weight:800;color:var(--n950);margin-bottom:.82rem;display:flex;align-items:center;gap:.42rem}
.sico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.77rem;flex-shrink:0}

/* Quiz */
.qbox{background:var(--n100);border:1px solid var(--n300);border-radius:12px;padding:1.1rem;margin-bottom:.9rem}
.qnum{font-size:.67rem;font-weight:700;color:var(--n400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.28rem}
.qq{font-size:.89rem;font-weight:600;color:var(--n900);margin-bottom:.82rem;line-height:1.5}
.qopts{display:flex;flex-direction:column;gap:.38rem}
.qopt{display:flex;align-items:center;gap:.55rem;padding:.58rem .82rem;border-radius:8px;border:1.5px solid var(--n300);background:var(--white);cursor:pointer;transition:all var(--t);font-size:.83rem;color:var(--n700)}
.qopt:hover{border-color:var(--blue-s);background:var(--blue-xs);color:var(--blue)}
.qopt.sel{border-color:var(--blue);background:var(--blue-xs);color:var(--blue)}
.qopt.ok{border-color:var(--teal);background:var(--teal-xs);color:#0a6060}
.qopt.no{border-color:#f87171;background:#fff1f2;color:#b91c1c}
.qr{width:16px;height:16px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.qr.on::after{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}

/* Resource */
.rlist{display:flex;flex-direction:column;gap:.42rem}
.ritem{display:flex;align-items:center;gap:.65rem;padding:.62rem .88rem;background:var(--n100);border:1px solid var(--n300);border-radius:9px;cursor:pointer;transition:all var(--t)}
.ritem:hover{border-color:var(--blue-s);background:var(--blue-xs)}
.rico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.92rem;flex-shrink:0}
.rname{font-size:.82rem;font-weight:600;color:var(--n800)}
.rmeta{font-size:.69rem;color:var(--n400)}
.rdl{font-size:.7rem;font-weight:600;color:var(--blue);margin-left:auto}

/* Note */
.note-ta{width:100%;min-height:140px;border:1.5px solid var(--n300);border-radius:9px;padding:.82rem;font-family:var(--fb);font-size:.84rem;color:var(--n800);resize:vertical;outline:none;background:var(--white);transition:border-color var(--t)}
.note-ta:focus{border-color:var(--blue)}

/* Module overview */
.mov{background:linear-gradient(135deg,var(--blue-xs),var(--white));border:1px solid var(--blue-s);border-radius:14px;padding:1.4rem;margin-bottom:1.4rem}
.mov-num{font-size:.68rem;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
.mov-title{font-family:var(--fd);font-size:1.35rem;font-weight:800;color:var(--n950);margin-bottom:.55rem;letter-spacing:-.03em}
.mov-desc{font-size:.87rem;color:var(--n600);line-height:1.75;margin-bottom:1rem}
.mov-stats{display:flex;gap:1.1rem;flex-wrap:wrap;margin-bottom:1rem}
.mov-stat{display:flex;align-items:center;gap:.35rem;font-size:.79rem;color:var(--n600)}
.mov-stat strong{color:var(--n800);font-weight:600}
.mov-list{display:flex;flex-direction:column;gap:.4rem}
.mov-item{display:flex;align-items:center;gap:.55rem;padding:.58rem .82rem;border-radius:9px;background:var(--white);border:1px solid var(--n300);cursor:pointer;transition:all var(--t);font-size:.83rem;color:var(--n700)}
.mov-item:hover{border-color:var(--blue-s);background:var(--blue-xs);color:var(--blue)}
.mov-status{font-size:.71rem;font-weight:700;margin-left:auto}
.ms-done{color:var(--teal)}.ms-todo{color:var(--n400)}
.start-btn{display:inline-flex;align-items:center;gap:.4rem;background:var(--blue);color:#fff;padding:.68rem 1.4rem;border-radius:9px;font-family:inherit;font-size:.87rem;font-weight:700;cursor:pointer;transition:all var(--t);box-shadow:0 2px 8px rgba(12,98,141,.25)}
.start-btn:hover{background:var(--blue-m);transform:translateY(-1px)}

/* Project */
.upload-zone{background:var(--n100);border:2px dashed var(--n300);border-radius:12px;padding:1.75rem;text-align:center;transition:all var(--t);cursor:pointer}
.upload-zone:hover{border-color:var(--blue-s);background:var(--blue-xs)}

/* Bottom nav */
.bnav{display:flex;align-items:center;justify-content:space-between;padding:.82rem 2.25rem;border-top:1px solid var(--n200);background:var(--white);flex-shrink:0;gap:1rem;flex-wrap:wrap}
.bnbtn{display:flex;align-items:center;gap:.42rem;font-size:.82rem;font-weight:600;padding:.55rem 1.05rem;border-radius:8px;transition:all var(--t)}
.bnprev{background:transparent;color:var(--n500);border:1px solid var(--n300)}
.bnprev:hover:not(:disabled){background:var(--n100);color:var(--n800)}
.bnprev:disabled{opacity:.4;cursor:not-allowed}
.bnnext{background:var(--blue);color:#fff;border:none;box-shadow:0 2px 6px rgba(12,98,141,.25)}
.bnnext:hover:not(:disabled){background:var(--blue-m);transform:translateY(-1px)}
.bnnext:disabled{opacity:.5;cursor:not-allowed}
.bn-mid{display:flex;flex-direction:column;align-items:center;gap:.28rem}
.bn-info{font-size:.7rem;color:var(--n400)}
.bn-done-btn{display:inline-flex;align-items:center;gap:.32rem;font-size:.74rem;font-weight:600;padding:.36rem .82rem;border-radius:7px;background:var(--n100);color:var(--n600);border:1.5px solid var(--n300);cursor:pointer;transition:all var(--t)}
.bn-done-btn:hover{background:var(--teal-xs);color:var(--teal);border-color:var(--teal-s)}
.bn-done-btn.done{background:var(--teal);color:#fff;border-color:var(--teal)}

/* Discussion */
.dthread{background:var(--n100);border:1px solid var(--n200);border-radius:12px;padding:.95rem;margin-bottom:.7rem}
.da{display:flex;align-items:center;gap:.48rem;margin-bottom:.48rem}
.da-av{width:29px;height:29px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800;color:#fff;flex-shrink:0}
.da-name{font-size:.79rem;font-weight:600;color:var(--n800)}
.da-date{font-size:.65rem;color:var(--n400)}
.dt{font-size:.82rem;color:var(--n700);line-height:1.6}
.dr{background:var(--white);border:1px solid var(--n300);border-radius:8px;padding:.7rem;margin-top:.6rem}
.dr-lbl{font-size:.67rem;font-weight:700;color:var(--blue);margin-bottom:.2rem}

/* Overlay mobile */
.overlay{display:none;position:fixed;inset:0;top:var(--tb-h);background:rgba(15,23,42,.35);z-index:90}
.overlay.show{display:block}

@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:var(--tb-h);height:calc(100vh - var(--tb-h));z-index:100;width:var(--sb-w)!important;opacity:1!important;transform:translateX(-100%);transition:transform .3s ease!important}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar.collapsed{transform:translateX(-100%)}
  .tb-name,.tb-bar{display:none}
  .content{padding:1.2rem 1.2rem 2rem}
  .bnav{padding:.75rem 1.2rem}
  .crumb{padding:.58rem 1.2rem}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSb()"></div>

<!-- TOPBAR -->
<header class="tb">
  <a href="index.html" class="tb-logo">

          body:`<p>Merge memungkinkan menggabungkan dua DataFrame berdasarkan kolom kunci — mirip JOIN di SQL.</p><pre><span class="sc"># Inner join (default)</span>\nresult = pd.<span class="sf">merge</span>(df_orders, df_customers, on=<span class="ss">'customer_id'</span>)\n\n<span class="sc"># Left join</span>\nresult = pd.<span class="sf">merge</span>(df_orders, df_products,\n                   on=<span class="ss">'product_id'</span>, how=<span class="ss">'left'</span>)</pre>`,

/* ═══ STATE ═══ */
const S = { modIdx:0, matIdx:0, view:'module', sbOpen:true, done:new Set() };

/* ═══ HELPERS ═══ */
function flat(){const r=[];COURSE.modules.forEach((m,mi)=>m.materis.forEach((mat,li)=>r.push({mi,li,mod:m,mat})));return r;}
function totalDone(){return S.done.size;}
function totalMat(){return flat().length;}
function curId(){return COURSE.modules[S.modIdx]?.materis[S.matIdx]?.id;}
function globalIdx(){return flat().findIndex(x=>x.mat.id===curId());}
function pct(){return totalMat()?Math.round(totalDone()/totalMat()*100):0;}

const TC={
  video:{ico:'📹',bg:'var(--blue-xs)',col:'var(--blue)',lbl:'Video'},
  read: {ico:'📄',bg:'var(--violet-xs)',col:'var(--violet)',lbl:'Bacaan'},
  quiz: {ico:'📝',bg:'var(--amber-xs)',col:'var(--amber)',lbl:'Quiz'},
  project:{ico:'🛠',bg:'var(--teal-xs)',col:'var(--teal)',lbl:'Project'}
};
const BTC={video:'bt-v',read:'bt-r',quiz:'bt-q',project:'bt-p'};
const BTL={video:'Video',read:'Bacaan',quiz:'Quiz',project:'Project'};

/* ═══ RENDER SIDEBAR ═══ */
function renderSb(){
  const d=totalDone(),t=totalMat(),p=pct();
  ['sbFill','tbFill'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.width=p+'%';});
  document.getElementById('sbTxt').textContent=`${d} / ${t} materi`;
  document.getElementById('tbLbl').textContent=`${d} / ${t} selesai`;
  document.getElementById('sbTitle').textContent=COURSE.title;
  document.getElementById('tbName').textContent=COURSE.title;

  let h='';
  COURSE.modules.forEach((mod,mi)=>{
    const modDone=mod.materis.filter(m=>S.done.has(m.id)).length;
    const open=mi===S.modIdx;
    h+=`<div><div class="mod-hd ${open?'open':''}" onclick="modClick(${mi})">
      <div class="mh-info"><div class="mh-num">Modul ${mi+1}</div><div class="mh-title">${mod.title}</div>
      <div class="mh-meta">${mod.materis.length} materi · ${modDone} selesai</div></div>
      <div class="mh-r">${modDone===mod.materis.length?'<span class="mh-badge">✓ Selesai</span>':''}<span class="mh-chev">▾</span></div>
    </div>
    <div class="mod-body ${open?'open':''}">`;
    mod.materis.forEach((mat,li)=>{
      const isActive=mi===S.modIdx&&li===S.matIdx&&S.view==='materi';
      const isDone=S.done.has(mat.id);
      const dc=isDone?'d-done':isActive?'d-active':'d-todo';
      const di=isDone?'✓':isActive?'▶':'—';
      h+=`<div class="mi ${isActive?'active':''}" onclick="loadMat(${mi},${li})">
        <div class="mi-dot ${dc}">${di}</div>
        <div class="mi-info"><div class="mi-title">${mat.title}</div>
        <div class="mi-sub"><span class="mi-badge ${BTC[mat.type]}">${BTL[mat.type]}</span><span class="mi-dur">${mat.dur}</span></div></div>
      </div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('sbBody').innerHTML=h;
}

/* ═══ RENDER CRUMB ═══ */
function renderCrumb(){
  const mod=COURSE.modules[S.modIdx];
  const mat=mod?.materis[S.matIdx];
  let h=`<a class="cl" href="course-detail.html">${COURSE.title}</a><span class="cs">›</span>`;
  if(S.view==='module'){
    h+=`<span class="cc">Modul ${S.modIdx+1}: ${mod.title}</span>`;
  } else {
    h+=`<a class="cl" href="#" onclick="showMod(${S.modIdx});return false;">Modul ${S.modIdx+1}: ${mod.title}</a><span class="cs">›</span><span class="cc">${mat?.title||''}</span>`;
  }
  document.getElementById('crumb').innerHTML=h;
}

/* ═══ RENDER BOTTOM NAV ═══ */
function renderBnav(){
  const fl=flat(),gi=globalIdx(),t=fl.length;
  const mat=COURSE.modules[S.modIdx]?.materis[S.matIdx];
  const isDone=mat&&S.done.has(mat.id);
  document.getElementById('bnInfo').textContent=S.view==='materi'?`Materi ${gi+1} dari ${t}`:`Modul ${S.modIdx+1} dari ${COURSE.modules.length}`;
  const bd=document.getElementById('btnDone');
  bd.className='bn-done-btn'+(isDone?' done':'');
  bd.textContent=isDone?'✓ Selesai':'✓ Tandai Selesai';
  bd.style.display=S.view==='materi'?'':'none';
  document.getElementById('btnPrev').disabled=(gi===0&&S.view==='materi');
  document.getElementById('btnNext').disabled=(gi===t-1&&S.view==='materi');
}

/* ═══ SHOW MODULE OVERVIEW ═══ */
function showMod(mi){
  S.modIdx=mi; S.view='module';
  const mod=COURSE.modules[mi];
  let items='';
  mod.materis.forEach((mat,li)=>{
    const isDone=S.done.has(mat.id);
    items+=`<div class="mov-item" onclick="loadMat(${mi},${li})">
      <span class="mi-badge ${BTC[mat.type]}">${BTL[mat.type]}</span>
      ${mat.title}
      <span class="mov-status ${isDone?'ms-done':'ms-todo'}">${isDone?'✓ Selesai':'—'}</span>
    </div>`;
  });
  document.getElementById('content').innerHTML=`
    <div class="mov">
      <div class="mov-num">Modul ${mi+1} dari ${COURSE.modules.length}</div>
      <div class="mov-title">${mod.title}</div>
      <p class="mov-desc">${mod.desc}</p>
      <div class="mov-stats">
        <div class="mov-stat">📚 <strong>${mod.materis.length}</strong> materi</div>
        <div class="mov-stat">✅ <strong>${mod.materis.filter(m=>S.done.has(m.id)).length}</strong> selesai</div>
        <div class="mov-stat">📹 <strong>${mod.materis.filter(m=>m.type==='video').length}</strong> video</div>
      </div>
      <div class="mov-list">${items}</div>
    </div>
    <button class="start-btn" onclick="loadMat(${mi},0)">Mulai Materi Pertama →</button>`;
  renderSb(); renderCrumb(); renderBnav();
  document.querySelector('.main-scroll').scrollTo({top:0,behavior:'smooth'});
}

/* ═══ LOAD MATERI ═══ */
function loadMat(mi,li){
  S.modIdx=mi; S.matIdx=li; S.view='materi';
  const mat=COURSE.modules[mi].materis[li];
  const tc=TC[mat.type];
  let main='';

  if(mat.type==='video'){
    main+=`<div class="vwrap"><div class="vg"></div><div class="vcode"><span class="sk">import</span> pandas <span class="sk">as</span> pd &nbsp;·&nbsp; <span class="sk">import</span> numpy <span class="sk">as</span> np<br><span class="sc"># ${mat.title}</span></div>
      <div class="vcenter"><div class="vlabel">${COURSE.title} · Modul ${mi+1}</div>
      <button class="vplay" onclick="togglePlay(this)"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 3L18 11L5 19V3Z" fill="white"/></svg></button>
      <div class="vdur">⏱ ${mat.dur}</div></div></div>`;
    if(mat.outcomes?.length){
      main+=`<div class="sblk"><div class="shd"><div class="sico" style="background:var(--teal-xs)">🎯</div>Yang Kamu Pelajari</div>
        <div class="outcome-box">${mat.outcomes.map(o=>`<div class="oi"><div class="oi-chk">✓</div>${o}</div>`).join('')}</div></div>`;
    }
    if(mat.body) main+=`<div class="sblk"><div class="shd"><div class="sico" style="background:var(--violet-xs)">📖</div>Ringkasan</div><div class="rich">${mat.body}</div></div>`;
  }
  else if(mat.type==='read'){
    main+=`<div class="rich">${mat.body}</div>`;
  }
  else if(mat.type==='quiz'){
    main+=`<div class="callout c-b" style="margin-bottom:1.2rem"><span class="ci">ℹ️</span><div>Quiz <strong>${mat.questions.length} soal</strong> pilihan ganda · Minimal 70% benar untuk lulus.</div></div>`;
    mat.questions.forEach((q,qi)=>{
      main+=`<div class="qbox"><div class="qnum">Soal ${qi+1} dari ${mat.questions.length}</div>
        <div class="qq">${q.q}</div>
        <div class="qopts" id="q${qi}">
          ${q.opts.map((o,oi)=>`<div class="qopt" onclick="pick(${qi},${oi},${q.ans})"><div class="qr" id="q${qi}r${oi}"></div>${o}</div>`).join('')}
        </div></div>`;
    });
    main+=`<div style="display:flex;justify-content:flex-end;margin-top:.85rem"><button style="font-size:.84rem;font-weight:700;color:#fff;background:var(--blue);border:none;padding:.62rem 1.4rem;border-radius:8px;cursor:pointer;font-family:inherit;box-shadow:0 2px 6px rgba(12,98,141,.25)" onclick="submitQ()">Submit Jawaban →</button></div>`;
  }
  else if(mat.type==='project'){
    main+=`<div class="callout c-t" style="margin-bottom:1.2rem"><span class="ci">🏆</span><div><strong>Project portfolio-ready!</strong> Cantumkan di LinkedIn, GitHub, atau resume.</div></div>
      <div class="sblk"><div class="shd"><div class="sico" style="background:var(--teal-xs)">📋</div>Yang Harus Dikerjakan</div>
        <div class="outcome-box">${mat.tasks.map(t=>`<div class="oi"><div class="oi-chk" style="background:var(--orange)">✓</div>${t}</div>`).join('')}</div></div>
      <div class="upload-zone"><div style="font-size:2.2rem;margin-bottom:.45rem">📁</div>
        <div style="font-size:.87rem;font-weight:600;color:var(--n700);margin-bottom:.28rem">Upload Notebook (.ipynb atau .pdf)</div>
        <div style="font-size:.75rem;color:var(--n500);margin-bottom:.8rem">Drag & drop atau klik · Maks. 20 MB</div>
        <button style="font-size:.79rem;font-weight:600;color:var(--blue);background:var(--white);border:1.5px solid var(--blue-s);padding:.46rem 1.05rem;border-radius:8px;cursor:pointer;font-family:inherit">Pilih File</button>
      </div>`;
  }

  // Shared files
  if(mat.files?.length){
    main+=`<div class="sblk" style="margin-top:1.4rem"><div class="shd"><div class="sico" style="background:var(--orange-xs)">📎</div>Lampiran & Resource</div>
      <div class="rlist">${mat.files.map(f=>`<div class="ritem"><div class="rico" style="background:var(--blue-xs)">${f.ico}</div><div><div class="rname">${f.name}</div><div class="rmeta">${f.meta}</div></div><div class="rdl">⬇ Unduh</div></div>`).join('')}</div></div>`;
  }

  const fileCnt=mat.files?.length||0;
  document.getElementById('content').innerHTML=`
    <div class="lesson-hd">
      <div class="lh-ico" style="background:${tc.bg}">${tc.ico}</div>
      <div><div class="lh-type" style="color:${tc.col}">${tc.lbl} · ${mat.dur}</div>
      <div class="lh-title">${mat.title}</div></div>
    </div>
    <div class="ctabs">
      <button class="ctab active" data-tab="m">Materi</button>
      <button class="ctab" data-tab="n">Catatan Saya</button>
      ${fileCnt?`<button class="ctab" data-tab="l">Lampiran (${fileCnt})</button>`:''}
      <button class="ctab" data-tab="d">Diskusi</button>
    </div>
    <div class="cp active" id="ct-m">${main}</div>
    <div class="cp" id="ct-n">
      <div style="background:var(--n100);border-radius:12px;border:1px solid var(--n300);padding:1.2rem">
        <div style="font-size:.84rem;font-weight:700;color:var(--n800);margin-bottom:.65rem">📝 Catatan Pribadimu</div>
        <textarea class="note-ta" placeholder="Tulis catatan di sini..."></textarea>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.55rem">
          <div style="font-size:.7rem;color:var(--n400)">💾 Tersimpan otomatis</div>
          <button style="font-size:.74rem;font-weight:600;color:var(--blue);background:var(--blue-xs);border:1px solid var(--blue-s);padding:.36rem .82rem;border-radius:7px;cursor:pointer;font-family:inherit">Simpan</button>
        </div>
      </div>
    </div>
    ${fileCnt?`<div class="cp" id="ct-l"><div class="rlist">${mat.files.map(f=>`<div class="ritem"><div class="rico" style="background:var(--blue-xs)">${f.ico}</div><div><div class="rname">${f.name}</div><div class="rmeta">${f.meta}</div></div><div class="rdl">⬇ Unduh</div></div>`).join('')}</div></div>`:''}
    <div class="cp" id="ct-d">
      <textarea class="note-ta" style="min-height:75px;resize:none;margin-bottom:.48rem" placeholder="Ajukan pertanyaan..."></textarea>
      <div style="display:flex;justify-content:flex-end;margin-bottom:1.1rem">
        <button style="font-size:.79rem;font-weight:700;color:#fff;background:var(--blue);border:none;padding:.46rem 1.05rem;border-radius:7px;cursor:pointer;font-family:inherit">Kirim</button>
      </div>
      <div class="dthread">
        <div class="da"><div class="da-av" style="background:linear-gradient(135deg,var(--blue),var(--blue-m))">AR</div><div><div class="da-name">Arya Ramadhan</div><div class="da-date">2 hari lalu</div></div></div>
        <div class="dt">Apakah perlu install Anaconda dulu atau bisa langsung pip install pandas?</div>
        <div class="dr"><div class="dr-lbl">💬 Instruktur · Andi Wirawan</div><div class="dt">Kedua cara bisa! Untuk pemula Anaconda lebih direkomendasikan karena sudah include semua yang dibutuhkan.</div></div>
      </div>
    </div>`;

  // Tab switching
  document.querySelectorAll('.ctab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.cp').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      const p=document.getElementById('ct-'+tab.dataset.tab);
      if(p) p.classList.add('active');
    });
  });

  renderSb(); renderCrumb(); renderBnav();
  document.querySelector('.main-scroll').scrollTo({top:0,behavior:'smooth'});
  if(window.innerWidth<=768) closeSb();
}

/* ═══ INTERACTIONS ═══ */
function modClick(mi){
  if(mi===S.modIdx&&S.view==='module') return;
  showMod(mi);
}
function togglePlay(btn){
  const p=btn.innerHTML.includes('M5 3');
  btn.innerHTML=p
    ?'<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="4" y="3" width="4" height="16" fill="white"/><rect x="14" y="3" width="4" height="16" fill="white"/></svg>'
    :'<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M5 3L18 11L5 19V3Z" fill="white"/></svg>';
}
function pick(qi,oi,ans){
  const opts=document.querySelectorAll(`#q${qi} .qopt`);
  opts.forEach((o,i)=>{o.classList.remove('sel');document.getElementById(`q${qi}r${i}`).classList.remove('on');});
  opts[oi].classList.add('sel');
  document.getElementById(`q${qi}r${oi}`).classList.add('on');
}
function submitQ(){
  const qs=COURSE.modules[S.modIdx].materis[S.matIdx].questions;
  let ok=0;
  qs.forEach((q,qi)=>{
    const sel=document.querySelector(`#q${qi} .qopt.sel`);
    if(!sel) return;
    const opts=document.querySelectorAll(`#q${qi} .qopt`);
    const selIdx=Array.from(opts).indexOf(sel);
    opts.forEach((o,oi)=>{o.classList.remove('sel','ok','no');if(oi===q.ans)o.classList.add('ok');else if(o===sel&&oi!==q.ans)o.classList.add('no');});
    if(selIdx===q.ans) ok++;
  });
  const p=Math.round(ok/qs.length*100),pass=p>=70;
  setTimeout(()=>alert(`${pass?'🎉':'😅'} Skor: ${ok}/${qs.length} (${p}%) — ${pass?'Lulus!':'Coba lagi ya!'}`),100);
  if(pass){S.done.add(curId());renderSb();renderBnav();}
}
function toggleDone(){
  const id=curId(); if(!id) return;
  if(S.done.has(id)) S.done.delete(id); else S.done.add(id);
  renderSb(); renderBnav();
}
function nav(dir){
  const fl=flat(),gi=globalIdx(),nx=fl[gi+dir];
  if(nx) loadMat(nx.mi,nx.li);
}
function toggleSb(){
  S.sbOpen=!S.sbOpen;
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=768){sb.classList.toggle('mobile-open',S.sbOpen);document.getElementById('overlay').classList.toggle('show',S.sbOpen);}
  else{sb.classList.toggle('collapsed',!S.sbOpen);}
}
function closeSb(){
  S.sbOpen=false;
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('overlay').classList.remove('show');
}
function exportPDF(){
  const b=document.getElementById('exportBtn'),o=b.textContent;
  b.textContent='⏳ Menyiapkan...';
  setTimeout(()=>{b.textContent='✅ Siap!';setTimeout(()=>b.textContent=o,2000);},1200);
}
function finishCourse(){
  const t=totalMat(),d=totalDone();
  if(d<t){alert(`Masih ada ${t-d} materi yang belum selesai.`);return;}
  alert('🎉 Selamat! Course selesai. Sertifikat siap diunduh!');
}

/* ═══ INIT ═══ */
showMod(0);
</script>
</body>
