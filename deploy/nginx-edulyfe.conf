# Nginx config untuk LMS di Biznet NEO VPS
# Simpan sebagai: /etc/nginx/sites-available/edulyfe
# Aktifkan:        sudo ln -s /etc/nginx/sites-available/edulyfe /etc/nginx/sites-enabled/
# Test & reload:   sudo nginx -t && sudo systemctl reload nginx
# Sesuaikan /var/www/lms-redesign dengan lokasi clone repo Anda.

server {
    listen 80;
    listen [::]:80;
    server_name edulyfe.id www.edulyfe.id;

    # Hasil build React (vite) — file statis
    root /var/www/lms-redesign/client/dist;
    index index.html;

    client_max_body_size 25m;   # izinkan upload file besar (PDF/gambar)

    # API -> Node (Express via PM2 di :4000)
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # File upload user (multer disk: server/uploads) -> Node
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — semua route lain ke index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
